<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GH Health Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-shell">

    <!-- Header -->
    <header class="popup-header">
      <img src="icons/icon48.png" alt="" class="popup-logo" width="22" height="22">
      <span class="popup-title">GH Health</span>
      <span class="popup-version">v2.0</span>
    </header>

    <!-- Token Section -->
    <section class="popup-section">
      <div class="section-head">
        <span class="section-label">GitHub Token</span>
        <span class="section-hint">Required for 5,000 req/hr</span>
      </div>
      <div class="token-row">
        <input id="github-token" class="text-input token-input" type="password"
          placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
        <button id="save-token" class="btn btn-accent" type="button">Save</button>
      </div>
      <div class="token-status" id="token-status">
        <span class="status-dot status-dot--grey"></span>
        <span class="status-text">Not set</span>
      </div>
    </section>

    <!-- Features Section -->
    <section class="popup-section">
      <div class="section-head"><span class="section-label">Features</span></div>

      <!-- Group A -->
      <div class="feature-group">
        <div class="group-label">On-page Enhancements</div>
        <div class="toggle-grid">
          <label class="toggle-row"><span class="toggle-text">File sizes &amp; download</span><input id="toggle-file-enhancements" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
          <label class="toggle-row"><span class="toggle-text">Absolute dates</span><input id="toggle-abs-dates" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
          <label class="toggle-row"><span class="toggle-text">Markdown printer</span><input id="toggle-md-printer" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
        </div>
      </div>

      <!-- Group B -->
      <div class="feature-group">
        <div class="group-label">Sidebar Panels</div>
        <div class="toggle-grid">
          <label class="toggle-row"><span class="toggle-text">LOC in sidebar</span><input id="toggle-loc-sidebar" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
          <label class="toggle-row"><span class="toggle-text">Health sidebar panel</span><input id="toggle-health-sidebar" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
          <label class="toggle-row"><span class="toggle-text">VS Code icons</span><input id="toggle-vsicons" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
          <label class="toggle-row"><span class="toggle-text">Web IDE button</span><input id="toggle-webide" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
        </div>
      </div>

      <!-- Group C -->
      <div class="feature-group">
        <div class="group-label">Filtering</div>
        <div class="toggle-grid">
          <label class="toggle-row"><span class="toggle-text">Bus factor warning</span><input id="toggle-bus-factor" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
          <label class="toggle-row"><span class="toggle-text">License risk warning</span><input id="toggle-license-risk" type="checkbox" class="sr-only"><span class="toggle-switch"></span></label>
        </div>
      </div>
    </section>

    <!-- Danger Zone -->
    <section class="popup-section popup-section--danger">
      <div class="section-head"><span class="section-label">Danger Zone</span></div>
      <div class="danger-actions">
        <button id="clear-cache" class="btn btn-danger" type="button">Clear cached data</button>
        <button id="export-data" class="btn btn-outline" type="button">Export data as JSON</button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="popup-footer">
      <div id="rate-limit-status"></div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
